services:
  redis:
    image: redis
    volumes:
      - "./redis-data:/data"
    command: redis-server --appendonly yes
    restart: on-failure
    ports:
      - "6379:6379"

  api:
    build:
      context: .
    working_dir: /usr/src/app
    command: bash -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn -b 0.0.0.0:8000 config.wsgi:application"
    volumes:
      - django_admin_static_files:/usr/src/app/static
    env_file:
      - ./.env
      - ./prod.env
    environment:
      REDIS_HOST: redis
    expose:
      - 8000
    depends_on:
      - redis

  nginx:
    build:
      context: ./nginx/
    ports:
      - 80:80
      # - 443:443  # SSL disabled — re-enable when certs are configured
    volumes:
      - ./prod_conf.d/:/etc/nginx/conf.d/
      # - /etc/ssl/:/etc/ssl/  # SSL disabled
      - /var/log/nginx/:/var/log/nginx/
      - django_admin_static_files:/home/app/static
    depends_on:
      - api

volumes:
  django_admin_static_files:

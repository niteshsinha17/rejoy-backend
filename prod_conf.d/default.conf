
    upstream backend{
        server api:8000;
    }

    # upstream frontend{
    #     server web:3000;
    # }

    server {
        listen 80;
        server_name api.rejoyhealth.com;

        return 301 https://www.api.rejoyhealth.com/$request_uri;
    }

    server {
        listen 443 ssl;
        
        ssl_certificate /etc/ssl/rejoyhealth.crt;
        ssl_certificate_key /etc/ssl/rejoyhealth.key; 
        
        server_name www.api.rejoyhealth.com;

        location /api {
            proxy_pass http://backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $server_name;

        }
        
        location ~ ^/(\w+/)?notification(/(\w+/)?)?$ {
            proxy_pass http://backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $server_name;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

